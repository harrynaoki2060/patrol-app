version: '3.9'

# =============================================================================
# 開発環境用オーバーライド設定
# docker compose up 時に自動適用される
# ホットリロード・デバッグポート公開・ボリュームマウント
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend: ホットリロード + ソースマウント + デバッグポート公開
  # ---------------------------------------------------------------------------
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    environment:
      LOG_LEVEL: DEBUG
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"  # バックエンド直接アクセス用（開発時のみ）

  # ---------------------------------------------------------------------------
  # Frontend: 開発モード + HMR + ソースマウント
  # ---------------------------------------------------------------------------
  frontend:
    # npm run dev はビルド済みイメージの CMD を上書き
    command: npm run dev
    environment:
      NODE_ENV: development
      INTERNAL_API_URL: http://backend:8000
      WATCHPACK_POLLING: "true"  # Docker on Windows/Mac でのファイル監視
    volumes:
      - ./frontend:/app
      - /app/node_modules   # コンテナ側の node_modules を保持（ホストでマスクしない）
      - /app/.next          # Next.js ビルドキャッシュを保持
    ports:
      - "3000:3000"  # フロントエンド直接アクセス用（開発時のみ）

  # ---------------------------------------------------------------------------
  # PostgreSQL: ホストからの直接接続を許可（開発時のみ）
  # ---------------------------------------------------------------------------
  postgres:
    ports:
      - "5432:5432"

  # ---------------------------------------------------------------------------
  # Redis: ホストからの直接接続を許可（開発時のみ）
  # ---------------------------------------------------------------------------
  redis:
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # MinIO: コンソールポートを公開（開発時のみ）
  # http://localhost:9001 でMinIOコンソールにアクセス可能
  # ---------------------------------------------------------------------------
  minio:
    ports:
      - "9001:9001"
