<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="安全パトロール">
  <meta name="theme-color" content="#1e40af">
  <title>安全パトロール点検表</title>
  <link rel="manifest" href="manifest.json">
  <!-- iOS ホーム画面アイコン -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <!-- SheetJS: Excel出力ライブラリ (ローカル配置でオフライン対応) -->
  <script defer src="./xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      font-size: 16px;
    }

    .header {
      background: #1e40af; color: white;
      padding: 14px 18px 12px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .header h1 { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .header-meta { font-size: 12px; opacity: 0.85; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .main { padding: 14px 14px 120px; max-width: 920px; margin: 0 auto; }

    .tab-nav { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab-btn {
      flex: 1; padding: 13px 8px;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: white; color: #6b7280;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      font-family: inherit;
      touch-action: manipulation;
    }
    .tab-btn.active { background: #1e40af; color: white; }
    .tab-btn.new-btn { flex: 0 0 72px; background: #f0fdf4; color: #16a34a; }

    .section { background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .section-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #e5e7eb; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field-row.full { grid-template-columns: 1fr; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 5px; }
    .field input {
      width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px;
      font-size: 16px; font-family: inherit; background: #f9fafb; -webkit-appearance: none;
    }
    .field input:focus { outline: none; border-color: #3b82f6; background: white; }

    .progress-label { font-size: 13px; color: #6b7280; margin-bottom: 6px; }
    .progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #22c55e; border-radius: 4px; transition: width 0.3s; }
    .progress-badges { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge.ok  { background: #dcfce7; color: #16a34a; }
    .badge.ng  { background: #fee2e2; color: #dc2626; }
    .badge.att { background: #fef3c7; color: #d97706; }

    .category { margin-bottom: 18px; }
    .category-header { background: #1e40af; color: white; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 8px; }

    .check-item { border: 2px solid #e5e7eb; border-radius: 10px; padding: 13px; margin-bottom: 8px; background: #fafafa; }
    .check-item.has-ok        { border-color: #86efac; background: #f0fdf4; }
    .check-item.has-ng        { border-color: #fca5a5; background: #fff5f5; }
    .check-item.has-attention { border-color: #fcd34d; background: #fffbeb; }

    .check-item-text { font-size: 14px; line-height: 1.65; color: #374151; margin-bottom: 11px; }
    .item-num { font-weight: 700; color: #1e40af; margin-right: 5px; }

    .check-buttons { display: flex; gap: 7px; }
    .check-btn {
      flex: 1; padding: 13px 6px;
      border: 2px solid; border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; background: white;
      font-family: inherit; min-height: 52px;
      touch-action: manipulation;
      -webkit-appearance: none;
      display: flex; align-items: center; justify-content: center;
    }
    .check-btn.ok         { border-color: #86efac; color: #16a34a; }
    .check-btn.ok.active  { background: #22c55e; border-color: #22c55e; color: white; }
    .check-btn.ng         { border-color: #fca5a5; color: #dc2626; }
    .check-btn.ng.active  { background: #ef4444; border-color: #ef4444; color: white; }
    .check-btn.att        { border-color: #fcd34d; color: #d97706; }
    .check-btn.att.active { background: #f59e0b; border-color: #f59e0b; color: white; }

    .notes-textarea {
      width: 100%; min-height: 120px; padding: 12px;
      border: 2px solid #e5e7eb; border-radius: 8px;
      font-size: 16px; font-family: inherit; resize: vertical;
      background: #f9fafb; -webkit-appearance: none;
    }
    .notes-textarea:focus { outline: none; border-color: #3b82f6; background: white; }

    .photo-actions { display: flex; gap: 8px; margin-bottom: 14px; }
    .photo-action-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      padding: 16px 10px; border: 2px dashed #93c5fd; border-radius: 10px;
      background: #eff6ff; color: #2563eb;
      font-size: 13px; font-weight: 700; cursor: pointer;
      touch-action: manipulation;
    }
    .photo-action-btn .icon { font-size: 22px; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    /* 写真カード（サムネ＋名前入力） */
    .photo-card {
      border-radius: 10px; overflow: hidden;
      border: 1px solid #e5e7eb; background: #f9fafb;
      display: flex; flex-direction: column;
    }
    .photo-thumb { position: relative; aspect-ratio: 1; background: #e5e7eb; flex-shrink: 0; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-del {
      position: absolute; top: 4px; right: 4px;
      width: 28px; height: 28px;
      background: rgba(0,0,0,0.65); color: white;
      border: none; border-radius: 50%;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; touch-action: manipulation;
    }
    /* 写真名入力欄 */
    .photo-name {
      width: 100%; border: none; border-top: 1px solid #e5e7eb;
      padding: 6px 8px; font-size: 12px; color: #374151;
      background: white; font-family: inherit;
      border-radius: 0; outline: none;
      -webkit-appearance: none;
    }
    .photo-name:focus { background: #eff6ff; border-top-color: #3b82f6; }
    .photo-name::placeholder { color: #9ca3af; }
    .photo-count { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 8px; }

    /* ---- autocomplete ---- */
    .ac-wrap { position: relative; }
    .ac-list {
      position: absolute; top: calc(100% - 2px); left: 0; right: 0; z-index: 400;
      background: white;
      border: 2px solid #3b82f6; border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 220px; overflow-y: auto;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }
    .ac-item {
      padding: 13px 14px; font-size: 15px; color: #1a202c;
      cursor: pointer; border-bottom: 1px solid #f3f4f6;
      touch-action: manipulation; user-select: none; -webkit-user-select: none;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:active { background: #eff6ff; color: #1e40af; }

    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 14px; background: white;
      border-top: 1px solid #e5e7eb;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.1);
    }
    .save-btn {
      width: 100%; padding: 17px; background: #1e40af; color: white;
      border: none; border-radius: 12px; font-size: 17px; font-weight: 700;
      cursor: pointer; font-family: inherit; letter-spacing: 0.5px;
      touch-action: manipulation;
    }
    .save-btn.saved { background: #16a34a; }

    .toast {
      position: fixed; top: 75px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: white; padding: 12px 22px; border-radius: 24px;
      font-size: 14px; font-weight: 700; z-index: 200;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25); white-space: nowrap;
      pointer-events: none; display: none;
    }

    .history-empty { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }
    .history-item { border: 1px solid #e5e7eb; border-radius: 10px; padding: 13px; margin-bottom: 8px; background: #fafafa; display: flex; align-items: flex-start; gap: 8px; }
    .history-info { flex: 1; cursor: pointer; }
    .history-date { font-weight: 700; color: #1e40af; font-size: 14px; margin-bottom: 2px; }
    .history-sub  { font-size: 12px; color: #6b7280; line-height: 1.6; }
    .history-del {
      padding: 8px 11px; background: #fee2e2; border: none; border-radius: 7px;
      color: #dc2626; font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; flex-shrink: 0; touch-action: manipulation;
    }
    .history-xlsx {
      padding: 8px 11px; background: #dcfce7; border: none; border-radius: 7px;
      color: #16a34a; font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; flex-shrink: 0; touch-action: manipulation;
    }

    /* 工事進捗率スライダー */
    .rate-wrap { text-align: center; padding: 8px 0 4px; }
    .rate-display { font-size: 52px; font-weight: 800; color: #1e40af; line-height: 1; margin-bottom: 16px; }
    .rate-slider {
      width: 100%; height: 40px;
      -webkit-appearance: none; appearance: none;
      background: #e5e7eb; border-radius: 20px; outline: none;
      cursor: pointer; touch-action: manipulation;
    }
    .rate-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 48px; height: 48px;
      background: #1e40af; border-radius: 50%; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .rate-labels { display: flex; justify-content: space-between; font-size: 12px; color: #9ca3af; margin: 6px 0 14px; }
    .rate-num-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .rate-num {
      width: 90px; padding: 10px; text-align: center;
      border: 2px solid #e5e7eb; border-radius: 8px;
      font-size: 22px; font-weight: 700; font-family: inherit;
      -webkit-appearance: none; touch-action: manipulation;
    }
    .rate-num:focus { outline: none; border-color: #3b82f6; }
    .rate-unit { font-size: 20px; font-weight: 700; color: #374151; }

    /* 特記事項ラベル */
    .notes-label {
      display: block; font-size: 13px; font-weight: 700; color: #1e40af;
      margin-bottom: 6px; padding: 7px 12px;
      background: #eff6ff; border-radius: 6px;
      border-left: 4px solid #1e40af;
    }
    .notes-item { margin-bottom: 16px; }

    /* Excelエクスポートボタン */
    .export-btn {
      width: 100%; padding: 16px;
      background: #16a34a; color: white;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      touch-action: manipulation; letter-spacing: 0.5px;
    }
    .export-btn:active { background: #15803d; }

    /* PDF出力ボタン */
    .pdf-btn {
      width: 100%; padding: 16px; margin-top: 10px;
      background: #0f766e; color: white;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      touch-action: manipulation; letter-spacing: 0.5px;
    }
    .pdf-btn:active { background: #0d6460; }

    /* 履歴PDFボタン */
    .history-pdf {
      padding: 8px 11px; background: #ccfbf1; border: none; border-radius: 7px;
      color: #0f766e; font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; flex-shrink: 0; touch-action: manipulation;
    }

    /* 役所提出PDFボタン */
    .gov-pdf-btn {
      width: 100%; padding: 16px; margin-top: 10px;
      background: #7c3aed; color: white;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      touch-action: manipulation; letter-spacing: 0.5px;
    }
    .gov-pdf-btn:active { background: #5b21b6; }
    .history-gov-pdf {
      padding: 8px 11px; background: #ede9fe; border: none; border-radius: 7px;
      color: #7c3aed; font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; flex-shrink: 0; touch-action: manipulation;
    }

    /* 写真カード操作バー（⬅ → ✕） */
    .photo-ctrl-bar {
      position: absolute; top: 4px; right: 4px;
      display: flex; gap: 3px;
    }
    .photo-ctrl-btn {
      width: 26px; height: 26px;
      background: rgba(0,0,0,0.65); color: white;
      border: none; border-radius: 50%;
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .photo-ctrl-btn:disabled { opacity: 0.25; pointer-events: none; }
    .photo-ctrl-del { background: rgba(185,28,28,0.82); }

    /* ===== iOS インストール案内 ===== */
    .ios-hint {
      display: flex; align-items: flex-start; gap: 10px;
      background: #eff6ff; border: 1.5px solid #93c5fd;
      border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
      font-size: 13px; color: #1e40af; line-height: 1.6;
    }
    .ios-hint-icon { font-size: 22px; flex-shrink: 0; }
    .ios-hint-body { flex: 1; }
    .ios-hint-title { font-weight: 700; margin-bottom: 2px; }
    .ios-hint-close {
      flex-shrink: 0; background: none; border: none;
      font-size: 18px; color: #6b7280; cursor: pointer;
      padding: 0 4px; touch-action: manipulation;
    }

    /* ===== 同期バー ===== */
    .sync-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: white; border-radius: 10px; padding: 10px 14px;
      margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 13px;
    }
    .net-status { font-weight: 700; flex-shrink: 0; }
    .net-online  { color: #16a34a; }
    .net-offline { color: #dc2626; }
    .unsynced-label { color: #d97706; font-weight: 700; }
    .sync-now-btn {
      padding: 6px 14px; background: #1e40af; color: white;
      border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; touch-action: manipulation;
    }
    .sync-now-btn:disabled { background: #9ca3af; cursor: default; }
    .diag-btn {
      padding: 5px 11px; background: #7c3aed; color: white;
      border: none; border-radius: 8px; font-size: 11px; font-weight: 700;
      cursor: pointer; font-family: inherit; touch-action: manipulation;
    }
    .diag-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500;
    }
    .diag-modal {
      position: fixed; inset: 12px; z-index: 501; background: white;
      border-radius: 14px; display: flex; flex-direction: column;
      overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .diag-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: #7c3aed; color: white;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
    }
    .diag-close {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 30px; height: 30px; border-radius: 50%; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: inherit; touch-action: manipulation;
    }
    .diag-body { padding: 16px; overflow-y: auto; flex: 1; font-size: 13px; }
    .diag-sec { margin-bottom: 18px; }
    .diag-sec-ttl {
      font-size: 13px; font-weight: 700; color: #374151;
      margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e5e7eb;
    }
    .diag-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 4px; border-bottom: 1px solid #f3f4f6; gap: 8px;
    }
    .diag-label { color: #6b7280; flex-shrink: 0; }
    .diag-val   { font-weight: 700; font-family: monospace; font-size: 13px; }
    .diag-ok    { color: #16a34a; }
    .diag-warn  { color: #dc2626; }
    .diag-tbl { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; }
    .diag-tbl th {
      background: #f3f4f6; padding: 5px 6px;
      text-align: left; font-size: 11px; border-bottom: 1px solid #e5e7eb;
    }
    .diag-tbl td {
      padding: 5px 6px; border-bottom: 1px solid #f3f4f6;
      vertical-align: top; word-break: break-all;
    }
    .diag-tbl tr.diag-warn-row td { background: #fff5f5; }
    .diag-mono { font-family: monospace; font-size: 10px; }
    .diag-note { font-size: 11px; color: #9ca3af; margin-top: 6px; }
    .draft-indicator { margin-left: auto; font-size: 11px; color: #9ca3af; }

    /* 履歴 同期バッジ */
    .sync-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 8px; margin-left: 6px;
      vertical-align: middle;
    }
    .sync-tag.synced   { background: #dcfce7; color: #16a34a; }
    .sync-tag.unsynced { background: #fef3c7; color: #d97706; }

    /* ヘッダー内レイアウト */
    .header { display: flex; align-items: center; gap: 10px; }
    .header-inner { flex: 1; min-width: 0; }
    .user-btn {
      flex-shrink: 0; padding: 7px 12px;
      background: rgba(255,255,255,0.2); color: white;
      border: 1px solid rgba(255,255,255,0.4); border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; touch-action: manipulation;
      white-space: nowrap; max-width: 110px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .user-btn:active { background: rgba(255,255,255,0.35); }

    /* 設定モーダル */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; padding: 20px;
    }
    .modal-card {
      background: white; border-radius: 16px;
      padding: 24px 22px; width: 100%; max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .modal-title { font-size: 17px; font-weight: 800; color: #1e40af; margin-bottom: 6px; }
    .modal-desc  { font-size: 13px; color: #6b7280; margin-bottom: 18px; }
    .modal-field { margin-bottom: 14px; }
    .modal-label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 5px; }
    .modal-input {
      width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px;
      font-size: 16px; font-family: inherit; background: #f9fafb;
      -webkit-appearance: none;
    }
    .modal-input:focus { outline: none; border-color: #3b82f6; background: white; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-cancel {
      flex: 1; padding: 13px; background: #f3f4f6; color: #374151;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; touch-action: manipulation;
    }
    .modal-save {
      flex: 2; padding: 13px; background: #1e40af; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; touch-action: manipulation;
    }

    /* 履歴フィルターバー */
    .hist-filter-bar {
      display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .hist-search {
      flex: 1; min-width: 0; padding: 11px 14px;
      border: 2px solid #e5e7eb; border-radius: 10px;
      font-size: 15px; font-family: inherit; background: white;
      -webkit-appearance: none;
    }
    .hist-search:focus { outline: none; border-color: #3b82f6; }
    .hist-sel {
      padding: 11px 12px; border: 2px solid #e5e7eb; border-radius: 10px;
      font-size: 14px; font-family: inherit; background: white;
      -webkit-appearance: none; cursor: pointer; color: #374151;
    }
    .hist-sel:focus { outline: none; border-color: #3b82f6; }
    .hist-count { font-size: 12px; color: #6b7280; margin-bottom: 8px; padding: 0 2px; }

    @media (min-width: 768px) {
      .photo-grid { grid-template-columns: repeat(4, 1fr); }
      .check-btn { flex: 0 0 90px; max-width: 90px; }
      .check-buttons { justify-content: flex-end; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <h1>🦺 安全パトロール点検表</h1>
      <div class="header-meta" id="header-meta">点検日・点検者・工事名を入力してください</div>
    </div>
    <button class="user-btn" id="user-btn">⚙ 設定</button>
  </div>

  <script>
    // ============================================================
    //  チェックリストデータ
    // ============================================================
    var CATS = [
      { name: '安全対策の点検・強化', items: [
        { id: 1,  text: '主任技術者・監理技術者（資格者証、講習終了証）の確認' },
        { id: 2,  text: '現場作業者は、作業に適した服装・保護具（保護帽、安全帯、安全チョッキ、安全靴、手袋、ゴーグル等）を身につけているか' },
        { id: 3,  text: '工事看板の確認（建設業の許可、労災保険関係成立票、再生資源利用計画書、施工体系図、建設業退職者共済制度の標識、緊急連絡体制表、週休２日実施看板）' },
        { id: 4,  text: '新規入場者教育、月例安全訓練等の実施' },
        { id: 5,  text: '作業手順の確認＜安全ミーティング（KY活動）＞を行っているか' },
        { id: 6,  text: '休憩場所等の確保及び現場事務所・休憩所・現場内・現場周辺の美装に努め、快適な作業環境確保への取組' },
        { id: 7,  text: '救急用具（救急箱等）の設置、熱中症への対策をおこなっているか' }
      ]},
      { name: '重大死傷事故防止（作業管理）', items: [
        { id: 8,  text: '工事区域外へのクレーン等の倒壊防止対策（敷鉄板、地盤改良等による地盤強化）' },
        { id: 9,  text: '運搬機械等の運行経路等の明示、作業範囲の明示・作業範囲区画状況は適切か' },
        { id: 10, text: '路肩・のり肩等危険な場所での作業、人との同時作業の有無等を把握し、誘導員・監視員の配置及び立入禁止箇所の措置を明らかにしているか' },
        { id: 11, text: '誘導員及び作業員には合図・誘導の方法の他、運転者の視認性に関する死角についても周知を図っているか' },
        { id: 12, text: '建設機械の点検結果表の有無、オペレーター有資格者の確認、騒音及び排ガス状況' },
        { id: 13, text: '重機作業は無理のない作業となっているか、主たる用途以外の作業はしていないか' },
        { id: 14, text: '工事安全看板等による周知、通路部の段差・隙間等の解消' },
        { id: 15, text: '資機材は整理整頓され、作業通路は確保されているか' },
        { id: 16, text: '1.5m以上の深さでの作業において土留を適正に使用しているか' },
        { id: 17, text: '積込量は過積載となっていないか' }
      ]},
      { name: '重大死傷事故防止（労働環境）', items: [
        { id: 18, text: '協力会社に一人親方はいるか（特別加入労災保険に加入しているか新規入場を確認）' },
        { id: 19, text: '作業員の体調の変化について把握できる体制となっているか' },
        { id: 20, text: '現場の雰囲気は良好か、すべての作業員が働きやすい環境となっているか' }
      ]},
      { name: '環境対策の徹底', items: [
        { id: 21, text: '地元・周辺住民からのクレームや意見等はないか、また真摯に対応できているか' },
        { id: 22, text: '騒音・振動・粉塵について適正な対策を行っているか' },
        { id: 23, text: '指定された場所での喫煙は守られているか' }
      ]}
    ];
    var TOTAL = 23;

    // ============================================================
    //  状態
    // ============================================================
    var checks  = {};
    var photos  = [];
    var records = [];
    var db          = null;    // IndexedDB instance
    var isDirty     = false;   // 未保存の変更あり
    var draftTimer  = null;    // 自動保存タイマー

    // ============================================================
    //  工事進捗率スライダー
    // ============================================================
    function setRate(v) {
      v = Math.min(100, Math.max(0, parseInt(v, 10) || 0));
      document.getElementById('f-rate').value     = v;
      document.getElementById('f-rate-num').value = v;
      document.getElementById('rate-display').textContent = v + '%';
      var grad = 'linear-gradient(to right, #1e40af ' + v + '%, #e5e7eb ' + v + '%)';
      document.getElementById('f-rate').style.background = grad;
    }

    // ============================================================
    //  Excel エクスポート（共通処理）
    // ============================================================
    function buildWorkbook(date, project, termStart, termEnd, inspector, contractor, subcontractor, checksData, rate, n1, n2, n3, photosData) {
      var wb = XLSX.utils.book_new();

      /* -------- Sheet1: パトロール結果 -------- */
      var s1 = [['日付','現場名','工期（開始）','工期（終了）','受注者','協力業者','点検者','カテゴリ','チェック項目','判定']];
      CATS.forEach(function(cat) {
        cat.items.forEach(function(item) {
          s1.push([
            date, project, termStart, termEnd, contractor, subcontractor, inspector,
            cat.name, item.text,
            checksData[item.id] || '未確認'
          ]);
        });
      });
      var ws1 = XLSX.utils.aoa_to_sheet(s1);
      ws1['!cols'] = [{wch:12},{wch:24},{wch:12},{wch:12},{wch:20},{wch:20},{wch:10},{wch:22},{wch:54},{wch:8}];
      XLSX.utils.book_append_sheet(wb, ws1, 'パトロール結果');

      /* -------- Sheet2: 工事進捗 -------- */
      var s2 = [['日付','現場名','工期（開始）','工期（終了）','工事進捗率（%）']];
      s2.push([date, project, termStart, termEnd, rate]);
      var ws2 = XLSX.utils.aoa_to_sheet(s2);
      ws2['!cols'] = [{wch:12},{wch:24},{wch:12},{wch:12},{wch:18}];
      XLSX.utils.book_append_sheet(wb, ws2, '工事進捗');

      /* -------- Sheet3: 特記事項 -------- */
      var s3 = [['日付','現場名','施工進捗','竣工書類進捗','その他問題点']];
      s3.push([date, project, n1, n2, n3]);
      var ws3 = XLSX.utils.aoa_to_sheet(s3);
      ws3['!cols'] = [{wch:12},{wch:24},{wch:40},{wch:40},{wch:40}];
      XLSX.utils.book_append_sheet(wb, ws3, '特記事項');

      /* -------- Sheet4: 写真一覧 -------- */
      var s4 = [['No.', '写真名', '撮影日時']];
      var pList = photosData || [];
      pList.forEach(function(p, i) {
        var obj  = (typeof p === 'string') ? { name: '', takenAt: '' } : p;
        var pName    = obj.name    || '';
        var pTakenAt = obj.takenAt
          ? obj.takenAt.replace('T', ' ').replace(/\.\d+Z$/, '')
          : '';
        s4.push([i + 1, pName, pTakenAt]);
      });
      var ws4 = XLSX.utils.aoa_to_sheet(s4);
      ws4['!cols'] = [{wch:6}, {wch:40}, {wch:22}];
      XLSX.utils.book_append_sheet(wb, ws4, '写真一覧');

      return wb;
    }

    // フォームの現在内容をExcel出力
    function exportExcel() {
      if (typeof XLSX === 'undefined') {
        alert('Excel出力ライブラリの読み込みに失敗しました。\nインターネット接続を確認してください。');
        return;
      }
      var date          = document.getElementById('f-date').value           || '';
      var project       = document.getElementById('f-project').value       || '現場名未入力';
      var termStart     = document.getElementById('f-term-start').value    || '';
      var termEnd       = document.getElementById('f-term-end').value      || '';
      var inspector     = document.getElementById('f-inspector').value     || '';
      var contractor    = document.getElementById('f-contractor').value    || '';
      var subcontractor = document.getElementById('f-subcontractor').value || '';
      var rate          = parseInt(document.getElementById('f-rate').value, 10) || 0;
      var n1            = document.getElementById('f-notes1').value || '';
      var n2            = document.getElementById('f-notes2').value || '';
      var n3            = document.getElementById('f-notes3').value || '';

      var wb    = buildWorkbook(date, project, termStart, termEnd, inspector, contractor, subcontractor, checks, rate, n1, n2, n3, photos);
      var fname = '安全パトロール_' + project + '_' + (date || 'nodate') + '.xlsx';
      XLSX.writeFile(wb, fname);
    }

    // 履歴レコードから直接Excel出力
    function exportExcelFromRecord(r) {
      if (typeof XLSX === 'undefined') {
        alert('Excel出力ライブラリの読み込みに失敗しました。\nインターネット接続を確認してください。');
        return;
      }
      var date          = r.date          || '';
      var project       = r.projectName  || '現場名未入力';
      var termStart     = r.termStart    || '';
      var termEnd       = r.termEnd      || '';
      var inspector     = r.inspector    || '';
      var contractor    = r.contractor   || '';
      var subcontractor = r.subcontractor || '';
      var rate          = r.progressRate || 0;
      var n1            = r.notes1 || r.notes || '';
      var n2            = r.notes2 || '';
      var n3            = r.notes3 || '';

      var wb    = buildWorkbook(date, project, termStart, termEnd, inspector, contractor, subcontractor, r.checks || {}, rate, n1, n2, n3, r.photos || []);
      var fname = '安全パトロール_' + project + '_' + (date || 'nodate') + '.xlsx';
      XLSX.writeFile(wb, fname);
    }

    // ============================================================
    //  PDF レポート HTML 生成（A4 3ページ構成）
    //  P1: 安全チェック一覧
    //  P2: 工事進捗率 + 特記事項
    //  P3+: 写真（3枚/ページ）
    // ============================================================
    function buildReportHTML(data) {
      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function nl2br(s) { return esc(s).replace(/\n/g,'<br>'); }

      var date          = data.date          || '―';
      var inspector     = data.inspector    || '―';
      var project       = data.projectName  || '―';
      var termStart     = data.termStart    || '';
      var termEnd       = data.termEnd      || '';
      var contractor    = data.contractor   || '';
      var subcontractor = data.subcontractor || '';
      var rate          = data.progressRate || 0;

      // ---- 各ページ共通ミニヘッダー ----
      function miniHd() {
        return '<div class="mini-hd">'
          + '<span class="mh-title">安全パトロール報告書</span>'
          + '<span class="mh-sep">｜</span>'
          + '<span>' + esc(project) + '</span>'
          + '<span class="mh-sep">｜</span>'
          + '<span>' + esc(date) + '</span>'
          + '</div>';
      }

      // ---- P1: チェックリスト ----
      var rows = '';
      CATS.forEach(function(cat) {
        cat.items.forEach(function(item, idx) {
          var val  = String((data.checks || {})[item.id] || '―');
          var jCls = val === 'OK' ? ' ok' : val === 'NG' ? ' ng' : val === '注意' ? ' att' : '';
          rows += '<tr>';
          if (idx === 0) {
            rows += '<td class="cat" rowspan="' + cat.items.length + '">' + esc(cat.name) + '</td>';
          }
          rows += '<td class="item"><span class="inum">' + item.id + '.</span> ' + esc(item.text) + '</td>';
          rows += '<td class="judge' + jCls + '">' + esc(val) + '</td>';
          rows += '</tr>';
        });
      });

      var termStr = termStart && termEnd ? (termStart + ' 〜 ' + termEnd)
                  : termStart ? (termStart + ' 〜 ')
                  : termEnd   ? ('〜 ' + termEnd)
                  : '';
      var page1 = '<div class="page">'
        + (contractor ? '<div class="co">' + esc(contractor) + '</div>' : '')
        + '<div class="rpt-title">安全パトロール報告書</div>'
        + '<div class="meta">'
        + '<div class="mi"><span class="ml">点 検 日</span><span class="mv">' + esc(date) + '</span></div>'
        + '<div class="mi"><span class="ml">パトロール者</span><span class="mv">' + esc(inspector) + '</span></div>'
        + '<div class="mi full"><span class="ml">工事名称</span><span class="mv">' + esc(project) + '</span></div>'
        + (termStr ? '<div class="mi full"><span class="ml">工　　期</span><span class="mv">' + esc(termStr) + '</span></div>' : '')
        + (subcontractor ? '<div class="mi full"><span class="ml">協力業者</span><span class="mv">' + esc(subcontractor) + '</span></div>' : '')
        + '</div>'
        + '<div class="stitle">✅ 安全チェック一覧</div>'
        + '<table><thead><tr>'
        + '<th style="width:16%">カテゴリ</th><th style="width:72%">チェック項目</th><th style="width:12%">判定</th>'
        + '</tr></thead><tbody>' + rows + '</tbody></table>'
        + '</div>';

      // ---- P2: 進捗率 + 特記事項 ----
      var notesHtml = '';
      if (data.notes1) notesHtml += '<div class="ns"><div class="nl">① 施工進捗</div><div class="nb">' + nl2br(data.notes1) + '</div></div>';
      if (data.notes2) notesHtml += '<div class="ns"><div class="nl">② 竣工書類進捗</div><div class="nb">' + nl2br(data.notes2) + '</div></div>';
      if (data.notes3) notesHtml += '<div class="ns"><div class="nl">③ その他問題点</div><div class="nb">' + nl2br(data.notes3) + '</div></div>';
      if (!notesHtml)  notesHtml = '<p class="empty">特記事項なし</p>';

    // ============================================================
    //  チェックリストをDOMで直接構築（innerHTML不使用）
    // ============================================================
    function buildChecklist() {
      var container = document.getElementById('checklist');

      CATS.forEach(function(cat) {
        var catDiv = document.createElement('div');
        catDiv.className = 'category';

        var header = document.createElement('div');
        header.className = 'category-header';
        header.textContent = cat.name;
        catDiv.appendChild(header);

        cat.items.forEach(function(item) {
          var itemDiv = document.createElement('div');
          itemDiv.className = 'check-item';
          itemDiv.id = 'item-' + item.id;

          // テキスト行
          var textDiv = document.createElement('div');
          textDiv.className = 'check-item-text';
          var numSpan = document.createElement('span');
          numSpan.className = 'item-num';
          numSpan.textContent = item.id + '.';
          textDiv.appendChild(numSpan);
          textDiv.appendChild(document.createTextNode(item.text));
          itemDiv.appendChild(textDiv);

          // ボタン行
          var btnRow = document.createElement('div');
          btnRow.className = 'check-buttons';

          var specs = [
            { cls: 'ok',  val: 'OK',   label: '✓ OK'  },
            { cls: 'ng',  val: 'NG',   label: '✗ NG'  },
            { cls: 'att', val: '注意', label: '⚠ 注意' }
          ];

          specs.forEach(function(spec) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'check-btn ' + spec.cls;
            btn.textContent = spec.label;

            // クロージャで id と val を束縛して直接リスナー登録
            (function(id, val, button) {
              button.addEventListener('click', function() {
                toggleCheck(id, val);
              });
            })(item.id, spec.val, btn);

            btnRow.appendChild(btn);
          });

          itemDiv.appendChild(btnRow);
          catDiv.appendChild(itemDiv);
        });

        container.appendChild(catDiv);
      });
    }

    // ============================================================
    //  チェック操作
    // ============================================================
    function toggleCheck(id, val) {
      checks[id] = (checks[id] === val) ? null : val;
      refreshItem(id);
      refreshProgress();
      markDirty();
    }

    function refreshItem(id) {
      var val  = checks[id];
      var el   = document.getElementById('item-' + id);
      if (!el) return;
      var btns = el.querySelectorAll('.check-btn');

      el.className = 'check-item'
        + (val === 'OK'   ? ' has-ok'        : '')
        + (val === 'NG'   ? ' has-ng'        : '')
        + (val === '注意' ? ' has-attention' : '');

      btns[0].className = 'check-btn ok'  + (val === 'OK'   ? ' active' : '');
      btns[1].className = 'check-btn ng'  + (val === 'NG'   ? ' active' : '');
      btns[2].className = 'check-btn att' + (val === '注意' ? ' active' : '');
    }

    function refreshProgress() {
      var ok = 0, ng = 0, att = 0, total = 0;
      var key;
      for (key in checks) {
        if (!checks[key]) continue;
        total++;
        if (checks[key] === 'OK')   ok++;
        if (checks[key] === 'NG')   ng++;
        if (checks[key] === '注意') att++;
      }
      var pct = Math.round(total / TOTAL * 100);

      document.getElementById('prog-label').textContent =
        'チェック進捗：' + total + ' / ' + TOTAL + ' 項目（' + pct + '%）';
      document.getElementById('prog-fill').style.width = pct + '%';

      var badgeEl = document.getElementById('prog-badges');
      badgeEl.innerHTML = '';
      if (ok)  { var b1 = document.createElement('span'); b1.className='badge ok';  b1.textContent='✓ OK '  +ok +'件'; badgeEl.appendChild(b1); }
      if (ng)  { var b2 = document.createElement('span'); b2.className='badge ng';  b2.textContent='✗ NG '  +ng +'件'; badgeEl.appendChild(b2); }
      if (att) { var b3 = document.createElement('span'); b3.className='badge att'; b3.textContent='⚠ 注意 '+att+'件'; badgeEl.appendChild(b3); }
    }

    //  Upstash Redis 上限 10MB に対して余裕を持って収まる
    // ============================================================
    var PHOTO_MAX_LONG  = 1000;            // 長辺の上限（px）
    var PHOTO_QUALITY   = 0.50;            // JPEG 品質
    var PHOTO_MAX_COUNT = 9;               // 1レコードの最大枚数
    var SYNC_MAX_BYTES  = 8 * 1024 * 1024; // 同期時の上限サイズ（8MB）

    function compressImage(file, cb) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var w = img.width;
          var h = img.height;

          // 長辺が上限を超える場合のみ縮小
          var longSide = Math.max(w, h);
          if (longSide > PHOTO_MAX_LONG) {
            var ratio = PHOTO_MAX_LONG / longSide;
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }

          var canvas = document.createElement('canvas');
          canvas.width  = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);

          var dataUrl = canvas.toDataURL('image/jpeg', PHOTO_QUALITY);
          cb(dataUrl);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // 既存 dataUrl を再圧縮（推定サイズが閾値超の場合のみ）
    function compressDataUrl(dataUrl, cb) {
      if (!dataUrl || !dataUrl.startsWith('data:')) { cb(dataUrl); return; }
      var estBytes = Math.round(dataUrl.length * 0.75);
      var THRESH   = 900 * 1024;
      if (estBytes < THRESH) { cb(dataUrl); return; }
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        var longSide = Math.max(w, h);
        if (longSide > PHOTO_MAX_LONG) {
          var ratio = PHOTO_MAX_LONG / longSide;
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', PHOTO_QUALITY));
      };
      img.onerror = function() { cb(dataUrl); };
      img.src = dataUrl;
    }

    function compressAllPhotos(arr, cb) {
      var result = (arr || []).slice();
      if (!result.length) { cb(result); return; }
      var i = 0;
      function next() {
        if (i >= result.length) { cb(result); return; }
        var p = normalizePhoto(result[i]);
        compressDataUrl(p.dataUrl || '', function(compressed) {
          result[i] = { dataUrl: compressed, name: p.name, takenAt: p.takenAt };
          i++;
          next();
        });
      }
      next();
    }

    function onPhoto(input) {
      var files = input.files;
      if (!files || !files.length) return;
      if (photos.length >= PHOTO_MAX_COUNT) {
        showToast('写真は' + PHOTO_MAX_COUNT + '枚までです');
        input.value = '';
        return;
      }
      for (var i = 0; i < files.length; i++) {
        (function(file) {
          compressImage(file, function(dataUrl) {
            if (photos.length >= PHOTO_MAX_COUNT) {
              showToast('写真は' + PHOTO_MAX_COUNT + '枚までです');
              return;
            }
            photos.push({ dataUrl: dataUrl, name: '', takenAt: new Date().toISOString() });
            refreshPhotos();
            markDirty();
            var grid = document.getElementById('photo-grid');
            var inputs = grid.querySelectorAll('.photo-name');
            if (inputs.length) inputs[inputs.length - 1].focus();
          });
        })(files[i]);
      }
      input.value = '';
    }

    function delPhoto(idx) {
      photos.splice(idx, 1);
      refreshPhotos();
    }

    // 写真を正規化（旧形式の文字列を {dataUrl,name,takenAt} に変換）
    function normalizePhoto(p) {
      if (typeof p === 'string') {
        return { dataUrl: p, name: '', takenAt: '' };
      }
      return p;
    }

    function refreshPhotos() {
      var grid  = document.getElementById('photo-grid');
      var count = document.getElementById('photo-count');
      while (grid.firstChild) grid.removeChild(grid.firstChild);

      if (!photos.length) {
        count.textContent = '写真なし';
        return;
      }
      count.textContent = photos.length + '枚';

      photos.forEach(function(photoRaw, i) {
        var photo = normalizePhoto(photoRaw);

        // ── カード（サムネ＋名前入力）────────────────────────
        var card = document.createElement('div');
        card.className = 'photo-card';

        // サムネイル部
        var thumb = document.createElement('div');
        thumb.className = 'photo-thumb';

        var img = document.createElement('img');
        img.src = photo.dataUrl;
        img.alt = '写真' + (i + 1);
        thumb.appendChild(img);

        var ctrlBar = document.createElement('div');
        ctrlBar.className = 'photo-ctrl-bar';

        var mvL = document.createElement('button');
        mvL.type = 'button'; mvL.className = 'photo-ctrl-btn'; mvL.textContent = '⬅';
        mvL.disabled = (i === 0);
        (function(index){ mvL.addEventListener('click', function(){ movePhoto(index, -1); }); })(i);
        ctrlBar.appendChild(mvL);

        var mvR = document.createElement('button');
        mvR.type = 'button'; mvR.className = 'photo-ctrl-btn'; mvR.textContent = '➡';
        mvR.disabled = (i === photos.length - 1);
        (function(index){ mvR.addEventListener('click', function(){ movePhoto(index, 1); }); })(i);
        ctrlBar.appendChild(mvR);

        var delBtn = document.createElement('button');
        delBtn.type = 'button'; delBtn.className = 'photo-ctrl-btn photo-ctrl-del'; delBtn.textContent = '✕';
        (function(index){ delBtn.addEventListener('click', function(){ delPhoto(index); }); })(i);
        ctrlBar.appendChild(delBtn);

        thumb.appendChild(ctrlBar);
        card.appendChild(thumb);

        // 写真名入力欄
        var nameInput = document.createElement('input');
        nameInput.type        = 'text';
        nameInput.className   = 'photo-name';
        nameInput.placeholder = '写真名（任意）';
        nameInput.value       = photo.name || '';
        nameInput.setAttribute('inputmode', 'text');
        (function(index) {
          nameInput.addEventListener('input', function() {
            // photos 配列を直接更新
            photos[index] = normalizePhoto(photos[index]);
            photos[index].name = this.value;
            markDirty();
          });
        })(i);
        card.appendChild(nameInput);

        grid.appendChild(card);
      });
    }

    function movePhoto(idx, dir) {
      var to = idx + dir;
      if (to < 0 || to >= photos.length) return;
      var tmp = photos[idx]; photos[idx] = photos[to]; photos[to] = tmp;
      refreshPhotos();
      markDirty();
    }

    // ============================================================
    //  保存（サーバー保存 → 失敗時 localStorage フォールバック）
    // ============================================================
    function doSave() {
      var record = collectFormData();
      record.synced = false;
      var btn = document.getElementById('save-btn');
      btn.textContent = '保存中…';
      btn.disabled = true;
      compressAllPhotos(record.photos, function(compressed) {
        record.photos = compressed;
        photos = compressed;
        doSaveWithRecord(record, btn);
      });
    }

    function doSaveWithRecord(record, btn) {
      // ① IndexedDB にまず保存
      dbPut('records', record, function(err) {
        if (err) {
          btn.textContent = '💾　保存する';
          btn.disabled = false;
          alert('ローカル保存に失敗しました。\n写真の枚数が多い場合は減らしてください。');
          return;
        }

        // メモリに追加
        records = records.filter(function(r) { return r.id !== record.id; });
        records.unshift(record);
        refreshRecCount();
        clearDraft();

        // 入力履歴を更新（autocomplete 候補に追加）
        if (record.projectName)   addToSuggestions('projects',       record.projectName);
        if (record.subcontractor) addToSuggestions('subcontractors', record.subcontractor);

        btn.textContent = '✓ 保存しました！';
        btn.classList.add('saved');
        btn.disabled = false;
        setTimeout(function() {
          btn.textContent = '💾　保存する';
          btn.classList.remove('saved');
        }, 2200);

        // ② オンラインならサーバーにも同期
        if (navigator.onLine) {
          syncRecord(record, function(ok) {
            if (ok) {
              record.synced = true;
              dbPut('records', record, null);
              for (var i = 0; i < records.length; i++) {
                if (records[i].id === record.id) { records[i].synced = true; break; }
              }
              showToast('保存・同期しました ✓');
            } else {
              showToast('保存しました（オフライン保存）');
            }
            refreshSyncStatus();
          });
        } else {
          showToast('保存しました（オフライン）');
          refreshSyncStatus();
        }
      });
    }

    // ============================================================
    //  新規作成
    // ============================================================
    function doNewForm() {
      if (!confirm('新規作成します。現在の入力内容は保存されません。よろしいですか？')) return;
      clearForm();
      switchTab('form');
    }

    function clearForm() {
      checks = {};
      photos = [];
      clearDraft();
      document.getElementById('f-date').value          = todayStr();
      document.getElementById('f-inspector').value     = '';
      document.getElementById('f-project').value       = '';
      document.getElementById('f-term-start').value    = '';
      document.getElementById('f-term-end').value      = '';
      document.getElementById('f-contractor').value    = '';
      document.getElementById('f-subcontractor').value = '';
      document.getElementById('f-notes1').value        = '';
      document.getElementById('f-notes2').value        = '';
      document.getElementById('f-notes3').value        = '';
      setRate(0);
      var i;
      for (i = 1; i <= TOTAL; i++) refreshItem(i);
      refreshProgress();
      refreshPhotos();
      onField();
    }

    // ============================================================
    //  履歴から読み込み
    // ============================================================
    function loadRecord(id) {
      var r = null;
      var i;
      for (i = 0; i < records.length; i++) {
        if (records[i].id === id) { r = records[i]; break; }
      }
      if (!r) return;

      checks = {};
      var k;
      for (k in (r.checks || {})) { checks[k] = r.checks[k]; }
      // 旧形式（文字列配列）も正規化してオブジェクトに統一
      photos = (r.photos || []).map(normalizePhoto);

      document.getElementById('f-date').value          = r.date          || todayStr();
      document.getElementById('f-inspector').value     = r.inspector     || '';
      document.getElementById('f-project').value       = r.projectName   || '';
      document.getElementById('f-term-start').value    = r.termStart     || '';
      document.getElementById('f-term-end').value      = r.termEnd       || '';
      document.getElementById('f-contractor').value    = r.contractor    || '';
      document.getElementById('f-subcontractor').value = r.subcontractor || '';
      document.getElementById('f-notes1').value        = r.notes1 || r.notes || '';
      document.getElementById('f-notes2').value        = r.notes2 || '';
      document.getElementById('f-notes3').value        = r.notes3 || '';
      setRate(r.progressRate || 0);
      for (i = 1; i <= TOTAL; i++) refreshItem(i);
      refreshProgress();
      refreshPhotos();
      onField();
      switchTab('form');
      showToast('記録を読み込みました');
    }

    // ============================================================
    //  履歴削除
    // ============================================================
    function delRecord(id) {
      if (!confirm('この記録を削除しますか？')) return;

      // IndexedDB から削除
      dbDelete('records', id, function() {
        records = records.filter(function(r) { return r.id !== id; });
        refreshRecCount();
        renderHistory();
        refreshSyncStatus();
        showToast('削除しました');
      });

      // サーバーからも削除（失敗しても無視）
      fetch('/api/records/' + id, { method: 'DELETE' }).catch(function() {});
    }

    // ============================================================
    //  履歴レンダリング
    // ============================================================
    function renderHistory() {
      updateInspectorSelect();

      var list    = document.getElementById('history-list');
      var countEl = document.getElementById('hist-count');
      while (list.firstChild) list.removeChild(list.firstChild);

      if (!records.length) {
        countEl.textContent = '';
        var empty = document.createElement('div');
        empty.className = 'history-empty';
        empty.textContent = '保存された記録がありません';
        list.appendChild(empty);
        return;
      }

      var shown = filteredRecords();
      if (histFilter.text || histFilter.inspector) {
        countEl.textContent = shown.length + '件表示（全' + records.length + '件）';
      } else {
        countEl.textContent = '全' + records.length + '件';
      }

      if (!shown.length) {
        var noResult = document.createElement('div');
        noResult.className = 'history-empty';
        noResult.textContent = '条件に一致する記録がありません';
        list.appendChild(noResult);
        return;
      }

      var section = document.createElement('div');
      section.className = 'section';

      var title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = '📂 保存済み記録（' + shown.length + '件）';
      section.appendChild(title);

      shown.forEach(function(r) {
        var ok = 0, ng = 0, att = 0, total = 0;
        var k;
        for (k in (r.checks || {})) {
          if (!r.checks[k]) continue;
          total++;
          if (r.checks[k] === 'NG')   ng++;
          if (r.checks[k] === '注意') att++;
        }

        var row = document.createElement('div');
        row.className = 'history-item';

        var info = document.createElement('div');
        info.className = 'history-info';

        var dateDiv = document.createElement('div');
        dateDiv.className = 'history-date';
        dateDiv.textContent = r.date || '';
        if (ng)  { var ns = document.createElement('span'); ns.style.cssText='color:#dc2626;margin-left:8px;font-size:11px'; ns.textContent='NG '+ng+'件';   dateDiv.appendChild(ns); }
        if (att) { var as = document.createElement('span'); as.style.cssText='color:#d97706;margin-left:6px;font-size:11px'; as.textContent='注意 '+att+'件'; dateDiv.appendChild(as); }
        info.appendChild(dateDiv);

        var syncTag = document.createElement('span');
        syncTag.className = 'sync-tag ' + (r.synced ? 'synced' : 'unsynced');
        syncTag.textContent = r.synced ? '✓ 同期済' : '● 未同期';
        dateDiv.appendChild(syncTag);

        var sub = document.createElement('div');
        sub.className = 'history-sub';
        var termDisp = r.termStart || r.termEnd
          ? '工期：' + (r.termStart || '') + (r.termStart && r.termEnd ? '〜' : '') + (r.termEnd || '') + '　'
          : '';
        var subcon = r.subcontractor ? '協力：' + r.subcontractor + '　' : '';
        sub.textContent = (r.projectName || '（工事名未入力）');
        var br = document.createElement('br');
        sub.appendChild(br);
        sub.appendChild(document.createTextNode(
          termDisp + subcon + '点検者：' + (r.inspector || '不明') + '　' + total + '/' + TOTAL + '項目　写真' + (r.photos || []).length + '枚'
        ));
        info.appendChild(sub);

        (function(rid) {
          info.addEventListener('click', function() { loadRecord(rid); });
        })(r.id);
        row.appendChild(info);

        var pdfBtn = document.createElement('button');
        pdfBtn.type = 'button';
        pdfBtn.className = 'history-pdf';
        pdfBtn.textContent = '🖨PDF';
        (function(rec) {
          pdfBtn.addEventListener('click', function() { exportPDFFromRecord(rec); });
        })(r);
        row.appendChild(pdfBtn);

        var govBtn = document.createElement('button');
        govBtn.type = 'button';
        govBtn.className = 'history-gov-pdf';
        govBtn.textContent = '📄役所PDF';
        (function(rec) {
          govBtn.addEventListener('click', function() { exportGovPDFFromRecord(rec); });
        })(r);
        row.appendChild(govBtn);

        var xlsxBtn = document.createElement('button');
        xlsxBtn.type = 'button';
        xlsxBtn.className = 'history-xlsx';
        xlsxBtn.textContent = '📥Excel';
        (function(rec) {
          xlsxBtn.addEventListener('click', function() { exportExcelFromRecord(rec); });
        })(r);
        row.appendChild(xlsxBtn);

        var delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'history-del';
        delBtn.textContent = '削除';
        (function(rid) {
          delBtn.addEventListener('click', function() { delRecord(rid); });
        })(r.id);
        row.appendChild(delBtn);

        section.appendChild(row);
      });

      list.appendChild(section);
    }

    // ============================================================
    //  トースト
    // ============================================================
    var toastTimer = null;
    function showToast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.style.display = 'block';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { el.style.display = 'none'; }, 2200);
    }

    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    // ============================================================
    //  IndexedDB ヘルパー
    // ============================================================
    var DB_NAME = 'patrol-db';
    var DB_VER  = 2;   // v2: suggestions ストア追加

    function openDB(cb) {
      if (db) { cb(null, db); return; }
      var req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains('records')) {
          d.createObjectStore('records', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('draft')) {
          d.createObjectStore('draft', { keyPath: 'key' });
        }
        if (!d.objectStoreNames.contains('suggestions')) {
          d.createObjectStore('suggestions', { keyPath: 'key' });
        }
      };
      req.onsuccess = function(e) { db = e.target.result; cb(null, db); };
      req.onerror   = function(e) { cb(e.target.error, null); };
    }

    function dbPut(store, obj, cb) {
      openDB(function(err, d) {
        if (err) { if (cb) cb(err); return; }
        var req = d.transaction(store, 'readwrite').objectStore(store).put(obj);
        req.onsuccess = function()    { if (cb) cb(null); };
        req.onerror   = function(e)   { if (cb) cb(e.target.error); };
      });
    }

    function dbGetAll(store, cb) {
      openDB(function(err, d) {
        if (err) { cb(err, []); return; }
        var req = d.transaction(store, 'readonly').objectStore(store).getAll();
        req.onsuccess = function(e) { cb(null, e.target.result || []); };
        req.onerror   = function(e) { cb(e.target.error, []); };
      });
    }

    function dbGet(store, key, cb) {
      openDB(function(err, d) {
        if (err) { cb(err, null); return; }
        var req = d.transaction(store, 'readonly').objectStore(store).get(key);
        req.onsuccess = function(e) { cb(null, e.target.result || null); };
        req.onerror   = function(e) { cb(e.target.error, null); };
      });
    }

    function dbDelete(store, key, cb) {
      openDB(function(err, d) {
        if (err) { if (cb) cb(err); return; }
        var req = d.transaction(store, 'readwrite').objectStore(store).delete(key);
        req.onsuccess = function()  { if (cb) cb(null); };
        req.onerror   = function(e) { if (cb) cb(e.target.error); };
      });
    }

    // ============================================================
    //  フォームデータ収集・復元
    // ============================================================
    function collectFormData() {
      var checksSnap = {};
      var k;
      for (k in checks) { checksSnap[k] = checks[k]; }
      return {
        id:             Date.now(),
        date:           document.getElementById('f-date').value           || '',
        inspector:      document.getElementById('f-inspector').value      || '',
        projectName:    document.getElementById('f-project').value        || '',
        termStart:      document.getElementById('f-term-start').value     || '',
        termEnd:        document.getElementById('f-term-end').value       || '',
        contractor:     document.getElementById('f-contractor').value     || '',
        subcontractor:  document.getElementById('f-subcontractor').value  || '',
        checks:         checksSnap,
        notes1:         document.getElementById('f-notes1').value         || '',
        notes2:         document.getElementById('f-notes2').value         || '',
        notes3:         document.getElementById('f-notes3').value         || '',
        progressRate:   parseInt(document.getElementById('f-rate').value, 10) || 0,
        photos:         photos.slice(),
        savedAt:        new Date().toISOString()
      };
    }

    function restoreFormData(r) {
      checks = {};
      var k;
      for (k in (r.checks || {})) { checks[k] = r.checks[k]; }
      // 旧形式（文字列配列）も正規化してオブジェクトに統一
      photos = (r.photos || []).map(normalizePhoto);
      document.getElementById('f-date').value          = r.date          || todayStr();
      document.getElementById('f-inspector').value     = r.inspector     || '';
      document.getElementById('f-project').value       = r.projectName   || '';
      document.getElementById('f-term-start').value    = r.termStart     || '';
      document.getElementById('f-term-end').value      = r.termEnd       || '';
      document.getElementById('f-contractor').value    = r.contractor    || '';
      document.getElementById('f-subcontractor').value = r.subcontractor || '';
      document.getElementById('f-notes1').value        = r.notes1 || r.notes || '';
      document.getElementById('f-notes2').value        = r.notes2 || '';
      document.getElementById('f-notes3').value        = r.notes3 || '';
      setRate(r.progressRate || 0);
      var i;
      for (i = 1; i <= TOTAL; i++) refreshItem(i);
      refreshProgress();
      refreshPhotos();
      onField();
    }

    // ============================================================
    //  自動保存（下書き）
    // ============================================================
    function markDirty() {
      isDirty = true;
      if (draftTimer) clearTimeout(draftTimer);
      draftTimer = setTimeout(autoSaveDraft, 30000);
    }

    function autoSaveDraft() {
      if (!isDirty) return;
      var draft = collectFormData();
      draft.key = 'current';
      dbPut('draft', draft, function(err) {
        if (!err) {
          isDirty = false;
          var t = new Date();
          var hhmm = ('0'+t.getHours()).slice(-2) + ':' + ('0'+t.getMinutes()).slice(-2);
          var el = document.getElementById('draft-indicator');
          if (el) el.textContent = '下書き保存済 ' + hhmm;
        }
      });
    }

    function clearDraft() {
      isDirty = false;
      if (draftTimer) { clearTimeout(draftTimer); draftTimer = null; }
      var el = document.getElementById('draft-indicator');
      if (el) el.textContent = '';
      dbDelete('draft', 'current', null);
    }

    // ============================================================
    //  入力履歴（autocomplete）
    // ============================================================
    function loadSuggestions(key, cb) {
      dbGet('suggestions', key, function(err, row) {
        cb(!err && row ? (row.items || []) : []);
      });
    }

    function addToSuggestions(key, value) {
      if (!value || !value.trim()) return;
      var v = value.trim();
      loadSuggestions(key, function(items) {
        items = items.filter(function(i) { return i !== v; }); // 重複除去
        items.unshift(v);                                       // 先頭に追加
        if (items.length > 30) items = items.slice(0, 30);     // 最大30件
        dbPut('suggestions', { key: key, items: items }, null);
      });
    }

    // inputId: 入力欄ID  listId: ドロップダウンdivのID  sugKey: IDBのキー名
    function setupAutocomplete(inputId, listId, sugKey) {
      var input = document.getElementById(inputId);
      var list  = document.getElementById(listId);
      if (!input || !list) return;

      var cache = [];      // メモリキャッシュ（focus のたびに更新）

      function renderList(items) {
        while (list.firstChild) list.removeChild(list.firstChild);
        if (!items.length) { list.style.display = 'none'; return; }
        items.forEach(function(item) {
          var div = document.createElement('div');
          div.className = 'ac-item';
          div.textContent = item;
          // mousedown / touchstart の両方で選択（blur より先に発火させる）
          function pick(e) {
            e.preventDefault();
            input.value = item;
            list.style.display = 'none';
            markDirty();
          }
          div.addEventListener('mousedown', pick);
          div.addEventListener('touchstart', pick, { passive: false });
          list.appendChild(div);
        });
        list.style.display = '';
      }

      function filterAndShow() {
        var q = input.value.trim().toLowerCase();
        var filtered = q
          ? cache.filter(function(s) { return s.toLowerCase().indexOf(q) !== -1; })
          : cache;
        renderList(filtered);
      }

      input.addEventListener('focus', function() {
        loadSuggestions(sugKey, function(items) {
          cache = items;
          filterAndShow();
        });
      });

      input.addEventListener('input', filterAndShow);

      input.addEventListener('blur', function() {
        // クリック/タップが先に発火するよう 200ms 遅延してから閉じる
        setTimeout(function() { list.style.display = 'none'; }, 200);
      });
    }

    function loadDraftIfExists() {

    function refreshSyncStatus() {
      var unsynced = records.filter(function(r) { return !r.synced; });
      var count    = unsynced.length;
      var label    = document.getElementById('unsynced-label');
      var countEl  = document.getElementById('unsynced-count');
      var btn      = document.getElementById('sync-now-btn');
      if (!label || !btn) return;

      }
    }

    // ============================================================
    //  同期処理
    // ============================================================
    function syncRecord(record, cb) {
      var jsonStr  = JSON.stringify(record);
      var estBytes = new Blob([jsonStr]).size;
      if (estBytes > SYNC_MAX_BYTES) {
        var mb = (estBytes / 1024 / 1024).toFixed(1);
        showToast('写真容量が大きすぎます（' + mb + 'MB）。写真を減らしてください');
        console.warn('[sync] サイズ超過 id=' + record.id + ' ' + mb + 'MB');
        cb(false);
        return;
      }
      var ctrl = new AbortController();
      var timer = setTimeout(function() { ctrl.abort(); }, 10000);
      fetch('/api/records', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    jsonStr,
        signal:  ctrl.signal
      })
      .then(function(r) {
        clearTimeout(timer);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function() { cb(true); })
      .catch(function(e) {
        clearTimeout(timer);
        console.warn('[sync] レコード送信失敗 id=' + record.id, e && e.message);
        cb(false);
      });
    }

    function runSyncDiag() {
      var panel = document.getElementById('diag-panel');
      var body  = document.getElementById('diag-body');
      panel.style.display = '';
      body.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:20px">計測中…</p>';
      setTimeout(function() {
        function esc(s) {
          return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        function blobBytes(str) { return new Blob([str]).size; }
        function fmtMB(b) { return (b/1024/1024).toFixed(2)+' MB'; }
        function fmtKB(b) { return (b/1024).toFixed(0)+' KB'; }
        function valHtml(text, warn) {
          return '<span class="diag-val '+(warn?'diag-warn':'diag-ok')+'">'+esc(text)+'</span>';
        }
        function row(label, valText, warn) {
          return '<div class="diag-row"><span class="diag-label">'+esc(label)+'</span>'
            +valHtml(valText,warn)+'</div>';
        }

        var unsynced = records.filter(function(r){return !r.synced;});
        var allBytes = blobBytes(JSON.stringify(records));

        var recDetails = records.map(function(r) {
          var recBytes   = blobBytes(JSON.stringify(r));
          var photos     = r.photos || [];
          var photoBytes = blobBytes(JSON.stringify(photos));
          var metaBytes  = blobBytes(JSON.stringify(Object.assign({},r,{photos:[]})));
          var maxPhoto   = 0;
          photos.forEach(function(p){
            var s = blobBytes((typeof p==='string')?p:(p.dataUrl||''));
            if(s>maxPhoto) maxPhoto=s;
          });
          return {
            id:r.id, date:r.date||'―', project:r.projectName||'（未入力）',
            photoCount:photos.length, recBytes:recBytes, photoBytes:photoBytes,
            metaBytes:metaBytes, maxPhoto:maxPhoto, synced:r.synced
          };
        });

        var maxRecBytes   = recDetails.reduce(function(m,r){return Math.max(m,r.recBytes);},0);
        var maxPhotoBytes = recDetails.reduce(function(m,r){return Math.max(m,r.maxPhoto);},0);
        var totalPhotoB   = recDetails.reduce(function(s,r){return s+r.photoBytes;},0);
        var maxUnsyncedB  = unsynced.reduce(function(m,r){
          return Math.max(m,blobBytes(JSON.stringify(r)));
        },0);

        var html = '';

        html += '<div class="diag-sec"><div class="diag-sec-ttl">📊 サマリ</div>';
        html += row('全レコード数',          records.length+' 件');
        html += row('未同期レコード数',      unsynced.length+' 件', unsynced.length>0);
        html += row('records 全体サイズ',   fmtMB(allBytes));
        html += row('最大レコードサイズ',   fmtMB(maxRecBytes),   maxRecBytes>8*1024*1024);
        html += row('写真 最大1枚サイズ',   fmtKB(maxPhotoBytes), maxPhotoBytes>500*1024);
        html += row('写真 全レコード総計',  fmtMB(totalPhotoB));
        html += row('同期対象 最大payload', fmtMB(maxUnsyncedB),  maxUnsyncedB>8*1024*1024);
        html += '</div>';

        html += '<div class="diag-sec"><div class="diag-sec-ttl">③ 未同期レコードの実測 payload サイズ</div>';
        if(!unsynced.length){
          html += '<p class="diag-note">未同期レコードなし</p>';
        } else {
          unsynced.forEach(function(r,i){
            var b=blobBytes(JSON.stringify(r));
            html += '<div class="diag-row"><span class="diag-label">['+i+'] '+esc(r.date)+' '+esc(r.projectName||'未入力')+'</span>'
              +valHtml(fmtMB(b), b>8*1024*1024)+'</div>';
          });
        }
        html += '</div>';

        html += '<div class="diag-sec"><div class="diag-sec-ttl">④ records の型確認（誤送信チェック）</div>';
        html += row('records の型', Array.isArray(records)?'配列（records[]）':'object（単一）', false);
        html += '<div class="diag-note">syncRecord() に渡す引数は単一オブジェクトであること</div></div>';

        var sorted = recDetails.slice().sort(function(a,b){return b.recBytes-a.recBytes;});
        html += '<div class="diag-sec"><div class="diag-sec-ttl">⑥ 大きいレコード TOP10（降順）</div>';
        html += '<table class="diag-tbl"><thead><tr>'
          +'<th>日付</th><th>工事名</th><th style="text-align:center">写真</th>'
          +'<th style="text-align:right">合計</th><th style="text-align:right">写真分</th>'
          +'<th style="text-align:right">メタ</th><th style="text-align:center">同期</th>'
          +'</tr></thead><tbody>';

        sorted.slice(0,10).forEach(function(r){
          var over = r.recBytes>8*1024*1024;
          html += '<tr'+(over?' class="diag-warn-row"':'')+'>'
            +'<td class="diag-mono">'+esc(r.date)+'</td>'
            +'<td>'+esc(r.project)+'</td>'
            +'<td style="text-align:center">'+r.photoCount+'枚</td>'
            +'<td style="text-align:right;font-weight:700'+(over?';color:#dc2626':'')+'">'+fmtMB(r.recBytes)+'</td>'
            +'<td style="text-align:right">'+fmtMB(r.photoBytes)+'</td>'
            +'<td style="text-align:right">'+fmtKB(r.metaBytes)+'</td>'
            +'<td style="text-align:center">'+(r.synced?'✓':'●未')+'</td>'
            +'</tr>';
        });
        html += '</tbody></table>';
        html += '<div class="diag-note">● = 未同期　✓ = 同期済み</div></div>';

        body.innerHTML = html;
      }, 30);
    }

    function syncAll(silent) {
      if (!navigator.onLine) {
        if (!silent) showToast('オフラインです。WiFi接続後に同期してください');
        return;
      }
      var unsynced = records.filter(function(r) { return !r.synced; });
      if (!unsynced.length) { if (!silent) showToast('同期済みです ✓'); return; }

      var btn   = document.getElementById('sync-now-btn');
      var done  = 0;
      var failed = 0;
      var total = unsynced.length;
      if (btn) { btn.disabled = true; btn.textContent = '同期中 0/' + total; }

      function next(idx) {
        if (idx >= total) {
          if (btn) { btn.disabled = false; btn.textContent = '☁ 今すぐ同期'; }
          var msg = done + '件同期しました ✓';
          if (failed) { msg += '（' + failed + '件失敗）'; }
          showToast(msg);
          refreshSyncStatus();
          renderHistory();
          return;
        }
        var r = unsynced[idx];
        syncRecord(r, function(ok) {
          if (ok) {
            r.synced = true;
            dbPut('records', r, null);
            for (var i = 0; i < records.length; i++) {
              if (records[i].id === r.id) { records[i].synced = true; break; }
            }
            done++;
          } else {
            failed++;
          }
          if (btn) { btn.textContent = '同期中 ' + (done + failed) + '/' + total; }
          next(idx + 1);
        });
      }
      next(0);
    }

    // サーバーのレコードとローカルをマージ
    function fetchAndMerge() {
      fetch('/api/records')
        .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function(srvRecs) {
          if (!Array.isArray(srvRecs)) return;
          var localMap = {};
          records.forEach(function(r) { localMap[r.id] = r; });

          var toAdd = [];
          srvRecs.forEach(function(sr) {
            if (localMap[sr.id]) {
              var local = localMap[sr.id];
              if (!local.synced) {
                local.synced = true;
                dbPut('records', local, null);
              }
              if ((!local.photos || local.photos.length === 0) &&
                  sr.photos && sr.photos.length > 0) {
                local.photos = sr.photos;
                dbPut('records', local, null);
              }
            } else {
              // ローカルにない → 追加
              sr.synced = true;
              if (!sr.photos) sr.photos = [];
              localMap[sr.id] = sr;
              toAdd.push(sr);
            }
          });

          var idx = 0;
          function addNext() {
            if (idx >= toAdd.length) {
              if (toAdd.length) {
                records = Object.keys(localMap).map(function(k) { return localMap[k]; })
                  .sort(function(a, b) { return b.id - a.id; });
                refreshRecCount();
                renderHistory(); // 他端末からのレコードを画面に反映
              }
              refreshSyncStatus();
              return;
            }
            dbPut('records', toAdd[idx], function() { idx++; addNext(); });
          }
          addNext();
        })
        .catch(function() { refreshSyncStatus(); });
    }

    // ============================================================

    var histFilter = { text: '', inspector: '' };

    function filteredRecords() {
      var txt = histFilter.text.toLowerCase();
      var ins = histFilter.inspector;
      return records.filter(function(r) {
        if (txt) {
          var hit = (r.projectName || '').toLowerCase().indexOf(txt) >= 0
                 || (r.inspector   || '').toLowerCase().indexOf(txt) >= 0
                 || (r.date        || '').indexOf(txt) >= 0;
          if (!hit) return false;
        }
        if (ins && (r.inspector || '') !== ins) return false;
        return true;
      });
    }

    function updateInspectorSelect() {
      var sel = document.getElementById('hist-inspector-sel');
      if (!sel) return;
      var current = histFilter.inspector;
      var names = [];
      records.forEach(function(r) {
        if (r.inspector && names.indexOf(r.inspector) < 0) names.push(r.inspector);
      });
      names.sort();
      while (sel.firstChild) sel.removeChild(sel.firstChild);
      var allOpt = document.createElement('option');
      allOpt.value = '';
      allOpt.textContent = '👤 全員';
      sel.appendChild(allOpt);
      names.forEach(function(name) {
        var opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        if (name === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

      window.addEventListener('online', function() {

        showToast('🟢 オンライン接続しました');
        // オンライン復帰時: 未同期データをアップロード → サーバーから新着を取得
        setTimeout(function() {
          syncAll(true);   // silent=true: 「同期済みです」トーストを抑制
          fetchAndMerge();
        }, 1000); // 接続が安定するまで少し待つ
      });
      window.addEventListener('offline', function() { updateOnlineStatus(); showToast('🔴 オフラインになりました'); });

      // ユーザー設定
      document.getElementById('user-btn').addEventListener('click', openSettings);
      document.getElementById('s-cancel').addEventListener('click', closeSettings);
      document.getElementById('s-save').addEventListener('click', saveSettingsAction);
      document.getElementById('settings-modal').addEventListener('click', function(e) {
        if (e.target === this) closeSettings();

      // 履歴フィルター
      document.getElementById('hist-search').addEventListener('input', function() {

    // ============================================================
    //  初期化
    // ============================================================
    function init() {
      loadUserSettings();
      document.getElementById('f-date').value = todayStr();
      buildChecklist();
      bindEvents();
      applyUserSettings();
      updateOnlineStatus();

      // IndexedDB からローカル記録を読み込み
      openDB(function(err) {
        if (err) {
          // IndexedDB 使えない場合 → サーバーから直接取得
          fetch('/api/records')
            .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
            .then(function(data) { records = Array.isArray(data) ? data : []; refreshRecCount(); refreshSyncStatus(); })
            .catch(function() { refreshRecCount(); refreshSyncStatus(); });
          return;
        }

        // ① 下書き確認
        loadDraftIfExists();

        // ② ローカル記録を読み込み
        dbGetAll('records', function(err2, localRecs) {
          records = err2 ? [] : localRecs.sort(function(a, b) { return b.id - a.id; });
          refreshRecCount();
          refreshSyncStatus();

          // ③ オンラインならサーバーとマージ
          if (navigator.onLine) { fetchAndMerge(); }
        });
      });
    }

    init();

  <!-- ============================================================

  <script>
    // ============================================================
    // Service Worker 登録 (iPad Safari PWA 対応)
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(reg) {
            console.log('[PWA] SW 登録完了 scope:', reg.scope);

            // ── 待機中の新 SW に SKIP_WAITING を送信 ─────────
            //    iPad で古い SW が残っている場合に強制更新する
            function sendSkipWaiting(worker) {
              if (!worker) return;
              worker.addEventListener('statechange', function() {
                if (worker.state === 'installed') {
                  console.log('[PWA] 新 SW installed → SKIP_WAITING 送信');
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
              // すでに installed 状態の場合も即送信
              if (worker.state === 'installed') {
                console.log('[PWA] 待機中 SW 発見 → SKIP_WAITING 即送信');
                worker.postMessage({ type: 'SKIP_WAITING' });
              }
            }

            // 今すでに waiting がいれば即送信
            if (reg.waiting) sendSkipWaiting(reg.waiting);

            // 新 SW が見つかったら送信
            reg.addEventListener('updatefound', function() {
              console.log('[PWA] SW updatefound');
              sendSkipWaiting(reg.installing);
            });

            // SW が切り替わったらオンライン時のみリロード
            // （オフライン時のリロードは白画面になるため行わない）
            navigator.serviceWorker.addEventListener('controllerchange', function() {
              if (navigator.onLine) {
                console.log('[PWA] controllerchange → オンラインのためリロード');
                window.location.reload();
              } else {
                console.log('[PWA] controllerchange → オフラインのためリロードスキップ');
              }
            });
          })
          .catch(function(e) { console.warn('[PWA] SW 登録失敗:', e); });
      });
    }

    // iOS インストール案内（Safari + 未インストール時のみ）
    (function() {
      var isIOS        = /iPad|iPhone|iPod/.test(navigator.userAgent)
                       || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                       || window.navigator.standalone;
      var isSafari     = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|Chrome/.test(navigator.userAgent);
      var dismissed    = localStorage.getItem('iosHintDismissed');

      if (isIOS && isSafari && !isStandalone && !dismissed) {
        var hint = document.getElementById('ios-hint');
        if (hint) hint.style.display = 'flex';
      }

      var closeBtn = document.getElementById('ios-hint-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          var hint = document.getElementById('ios-hint');
          if (hint) hint.style.display = 'none';
          localStorage.setItem('iosHintDismissed', '1');
        });
      }
    })();
  </script>
</body>
</html>
