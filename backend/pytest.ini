[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# カバレッジオプション（pytest-cov を使う場合）
# addopts = --cov=app --cov-report=term-missing

# テスト用の環境変数（実際の接続は docker compose exec backend pytest で実行）
env =
    DATABASE_URL=postgresql+asyncpg://app:changeme_dev_password@postgres:5432/entry_db
    REDIS_URL=redis://:changeme_dev_password@redis:6379/0
    MINIO_ENDPOINT=minio:9000
    MINIO_ACCESS_KEY=minioadmin
    MINIO_SECRET_KEY=changeme_dev_password
    MINIO_BUCKET=entry-documents
    LOG_LEVEL=WARNING
