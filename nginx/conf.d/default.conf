# =============================================================================
# Nginx リバースプロキシ設定
# 開発環境用: 単一ドメイン (localhost) で frontend/backend を振り分け
#
# TODO: 本番環境では以下の2サーバーブロックに分割すること
#   - entry.example.com  → 公開フォーム（全IP許可・レート制限あり）
#   - admin.example.com  → 管理画面（社内IPのみ許可）
# =============================================================================

# ---------------------------------------------------------------------------
# レート制限ゾーン定義
# ---------------------------------------------------------------------------
# QR 検証専用: IP ごとに 10 req/min（burst=5）
# ブルートフォース対策の最外郭としてバックエンドの failed_attempts と二重防護する
limit_req_zone $binary_remote_addr zone=qr_verify:10m   rate=10r/m;
# 一般公開 API（QR 以外の公開エンドポイント将来追加用）
limit_req_zone $binary_remote_addr zone=public_api:10m  rate=30r/m;
# 入場申請送信: 厳しいレート制限
limit_req_zone $binary_remote_addr zone=submit_api:10m  rate=5r/m;
# 管理 API
limit_req_zone $binary_remote_addr zone=admin_api:10m   rate=60r/m;

# ---------------------------------------------------------------------------
# アップストリーム定義
# ---------------------------------------------------------------------------
upstream backend {
    server backend:8000;
    keepalive 16;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# HTTP サーバー (開発環境: HTTPS なし)
# TODO: 本番環境では HTTPS (443) に変更し、HTTP は 301 リダイレクト
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name localhost;

    # タイムアウト設定
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # セキュリティヘッダー
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # TODO: 本番では CSP を厳密に設定する
    # add_header Content-Security-Policy "default-src 'self';" always;

    # -----------------------------------------------------------------------
    # バックエンド API プロキシ
    # -----------------------------------------------------------------------

    # QR 検証 (最も厳しいレート制限 — ブルートフォース対策)
    location = /api/public/qr/verify {
        limit_req zone=qr_verify burst=5 nodelay;
        # レート超過時は 429 を返す（デフォルトの 503 ではなくセマンティクスを正確に）
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 公開 API (QR 関連その他 - 将来拡張用)
    location /api/public/qr/ {
        limit_req zone=public_api burst=10 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 公開 API（作業員検索 / Draft 作成・更新・送信）- 厳しいレート制限
    # submit (POST /entries/{id}/submit) の多重送信・スパム対策
    location ~ ^/api/public/(workers|entries) {
        limit_req zone=submit_api burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 管理 API
    # TODO: 本番では以下の IP 制限コメントを解除すること
    location /api/admin/ {
        # TODO: 本番環境でコメントを解除して社内 IP に制限する
        # allow 192.168.0.0/16;
        # allow 10.0.0.0/8;
        # deny all;

        limit_req zone=admin_api burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API ドキュメント (開発時のみ)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -----------------------------------------------------------------------
    # Next.js HMR (Hot Module Replacement) - WebSocket
    # 開発モードでのみ使用される
    # -----------------------------------------------------------------------
    location /_next/webpack-hmr {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # Next.js 静的ファイル (キャッシュ設定)
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        # 静的ファイルは長期キャッシュ可能
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # -----------------------------------------------------------------------
    # フロントエンド (Next.js) プロキシ
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # -----------------------------------------------------------------------
    # ヘルスチェック (Nginx 自身)
    # -----------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}
